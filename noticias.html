  <title>Noticias | Sanflo SRL</title>

  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon.png">
  <link rel="shortcut icon" href="assets/icons/favicon.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Tu CSS -->

</head>

<body>

  <!-- NAVBAR (PILL) -->
  <nav class="navbar navbar-expand-lg navbar-dark sanflo-nav">
    <div class="container sanflo-nav-inner">

      <a class="navbar-brand d-flex align-items-center gap-2 sanflo-brand" href="index.html">
        <img src="assets/img/logo-blanco.png" alt="Sanflo SRL" height="40">
        <span class="fw-bold text-white">Sanflo SRL</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link sanflo-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link sanflo-link active" href="noticias.html">Noticias</a></li>
          <li class="nav-item"><a class="nav-link sanflo-link" href="enlaces.html">Enlaces</a></li>
          <li class="nav-item"><a class="nav-link sanflo-link" href="contacto.html">Contacto</a></li>
        </ul>

        <button id="themeToggle" class="btn btn-outline-light ms-3 sanflo-iconbtn" type="button" aria-label="Cambiar tema">
          <i data-theme-icon class="bi bi-sun-fill"></i>
        </button>
      </div>

    </div>
  </nav>

  <!-- HEADER -->
  <section class="py-5 text-center bg-light">
    <div class="container">
      <h1 class="fw-bold text-sanflo">Noticias y Artículos</h1>
      <p class="lead">Información útil sobre higiene, insumos y mantenimiento</p>
    </div>
  </section>

  <!-- BUSCADOR -->
  <section class="py-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <input
            type="text"
            id="newsSearch"
            class="form-control form-control-lg"
            placeholder="Buscar noticia..."
          >
        </div>
      </div>
    </div>
  </section>

  <!-- GRID DE NOTICIAS -->
  <section class="pb-5">
    <div class="container">
      <div id="newsGrid" class="row row-cols-1 row-cols-md-2 g-4"></div>
    </div>
  </section>
  
  <!-- MODAL NOTICIA -->
<div class="modal fade" id="newsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header">
        <div>
          <span id="newsModalTag" class="badge text-bg-info mb-2">Categoría</span>
          <h5 class="modal-title" id="newsModalTitle">Título de la noticia</h5>
          <div class="small text-muted" id="newsModalDate"></div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="newsModalBody">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sanflo" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center p-4">
    <p class="mb-2">© 2026 Sanflo SRL | Santo Domingo</p>
    <div>
      <a href="https://instagram.com/sanflo.srl" target="_blank" class="text-white me-3" rel="noopener">
        <i class="bi bi-instagram"></i>
      </a>
      <a href="https://wa.me/18295676383" target="_blank" class="text-white" rel="noopener">
        <i class="bi bi-whatsapp"></i>
      </a>
    </div>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/noticias.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
